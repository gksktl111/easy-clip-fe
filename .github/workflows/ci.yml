name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  verify:
    name: 검증
    runs-on: ubuntu-latest

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v7

      - name: Node.js 설정
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: Playwright 브라우저 설치
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: TypeCheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit Test
        run: npm run test

      - name: E2E Test
        run: npm run test:e2e

      - name: Playwright 리포트 업로드
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
